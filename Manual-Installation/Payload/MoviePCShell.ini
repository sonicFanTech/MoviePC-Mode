[Shell]
; MoviePC Mode release configuration. The installer assigns shell mode only to the standard MoviePC account.
ShellMode=1

; Reserve the bottom taskbar space so normal applications maximize above the custom taskbar.
ReserveTaskbarSpace=1

; Optional override for the Start-menu account tile image. Leave blank to use the Windows account picture when available.
AccountPicturePath=

[Apps]
; The installer fills these paths after preparing the MoviePC media applications.
; Brave uses a dedicated MoviePC profile. VLC is stored privately under the MoviePC Mode folder.
BrowserPath=
VLCPath=%ProgramFiles%\MoviePC Mode\Apps\VLC\vlc.exe

; Approved Start-menu shortcuts.
HomeUrl=https://www.imdb.com/
VideoUrl=https://www.youtube.com/

[Movies]
; Optional additional permitted library, for example D:\Movies
; Environment variables such as %USERPROFILE% are supported.
ExtraFolder=

[Customization]
; MoviePC Settings stores per-user desktop and restricted File Explorer appearance options in:
; %LOCALAPPDATA%\MoviePC Shell\MoviePCUserSettings.ini

[BrowserRestriction]
; The installer applies a per-user Brave URLBlocklist=* policy and an approved streaming-site URLAllowlist.
; Administrators can extend the allowlist with the manual script under Manual-Installation when a legitimate service needs extra domains.
